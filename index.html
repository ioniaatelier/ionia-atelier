<!DOCTYPE html>
<html lang="tr">
<head>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f5f0;
            color: #2c3e50;
            font-family: 'Montserrat', sans-serif;

        .container {
