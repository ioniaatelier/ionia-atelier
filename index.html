<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ionia Atelier | Doğadan, geçmişten, bugüne...</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a66e5b;
            --text-dark: #4a372f;
            --bg: #f9f5f0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: 'Cinzel', serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .glow {
            position: absolute;
            width: 60vmax;
            height: 60vmax;
            background: radial-gradient(circle, rgba(165, 118, 103, 0.1), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transition: transform 0.1s ease-out;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .tilt-wrapper {
            transition: transform 0.2s ease-out;
            transform-style: preserve-3d;
            position: relative;
        }

        .coming-soon-overlay {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(4rem, 15vw, 12rem);
            color: var(--primary);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%) rotate(-5deg);
            z-index: 3;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            animation: fadeInSignature 2.5s forwards ease-in-out 1.2s;
            text-shadow: 2px 2px 20px rgba(249, 245, 240, 0.8);
        }

        .brand-name {
            font-size: clamp(2.5rem, 8vw, 6rem);
            color: var(--primary);
            letter-spacing: 0.4em;
            margin: 0;
            font-weight: 400;
            position: relative;
            z-index: 2;
            opacity: 0;
            animation: fadeInDown 1.5s forwards ease-out;
        }

        .divider {
            width: clamp(150px, 30vw, 400px);
            height: 1px;
            background-color: var(--primary);
            margin: 25px auto;
            opacity: 0;
            animation: fadeIn 2s forwards ease-in 0.5s;
        }

        .slogan {
            font-size: clamp(0.7rem, 1.5vw, 1rem);
            color: var(--primary);
            letter-spacing: 0.5em;
            text-transform: uppercase;
            margin: 0 0 50px;
            opacity: 0;
            animation: fadeInUp 2s forwards ease-out 0.8s;
        }

        .action-area {
            opacity: 0;
            position: relative;
            z-index: 4;
            animation: fadeIn 3s forwards ease-in 2s;
        }

        .ig-button {
            display: inline-block;
            text-decoration: none;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 15px 45px;
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
            backdrop-filter: blur(5px);
            font-weight: 700;
        }

        .ig-button:hover {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 15px 30px rgba(165, 118, 103, 0.2);
            transform: translateY(-3px);
        }

        footer {
            position: relative;
            z-index: 2;
            width: 100%;
            padding-bottom: 40px;
            text-align: center;
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: #8c7b75;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 3s forwards ease-in 2.5s;
            color: var(--primary);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInSignature {
            from { opacity: 0; transform: translate(-50%, -50%) rotate(-5deg) scale(0.9); filter: blur(5px); }
            to { opacity: 0.15; transform: translate(-50%, -60%) rotate(-5deg) scale(1); filter: blur(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="glow" id="glow"></div>

    <div class="container">
        <div class="tilt-wrapper" id="tilt">
            <div class="coming-soon-overlay">Çok Yakında</div>
            <h1 class="brand-name">IONIA ATELIER</h1>
            <div class="divider"></div>
            <p class="slogan">Doğadan, geçmişten, bugüne...</p>
            
            <div class="action-area">
                <a href="https://www.instagram.com/ioniaatelier" target="_blank" class="ig-button">
                    Keşfetmeye Başla
                </a>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Ionıa Atelıer
    </footer>

    <script>
        const glow = document.getElementById('glow');
        const tilt = document.getElementById('tilt');

        document.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            glow.style.transform = `translate(${clientX - glow.offsetWidth / 2}px, ${clientY - glow.offsetHeight / 2}px)`;
            const xRotation = (clientY / window.innerHeight - 0.5) * 10;
            const yRotation = (clientX / window.innerWidth - 0.5) * -10;
            tilt.style.transform = `rotateX(${xRotation}deg) rotateY(${yRotation}deg)`;
        });

        if ('ontouchstart' in window) {
            let angle = 0;
            function animate() {
                angle += 0.012;
                const move = Math.sin(angle) * 2;
                tilt.style.transform = `rotateX(${move}deg) rotateY(${move}deg)`;
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
